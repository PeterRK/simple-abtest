name: Java SDK CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-sdk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: sdk-java/pom.xml
      - run: mvn --batch-mode test
        working-directory: sdk-java
