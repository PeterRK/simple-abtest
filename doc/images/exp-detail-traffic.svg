<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <style>
    .title { font: 20px sans-serif; fill: #222; }
    .label { font: 14px sans-serif; fill: #444; }
    .small { font: 12px sans-serif; fill: #555; }
    .box  { fill: #f9fbff; stroke: #b3c0ff; stroke-width: 1.5; }
    .header { fill: #eef2ff; }
    .pill { fill: #e5e7eb; }
    .layer { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1; }
    .segment-a { fill: #bfdbfe; }
    .segment-b { fill: #a7f3d0; }
    .segment-c { fill: #fecaca; }
    .segment-selected { stroke: #1d4ed8; stroke-width: 2; }
    .group { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; }
    .group-selected { stroke: #1d4ed8; stroke-width: 2; }
  </style>

  <!-- Page title -->
  <text x="40" y="40" class="title">实验详情页 - 分流设置示意</text>

  <!-- Traffic matrix（多层垂直展开示意） -->
  <rect x="40" y="70" width="880" height="400" class="box"/>
  <rect x="40" y="70" width="880" height="32" class="header"/>
  <text x="52" y="92" class="label">分流设置（Layer 纵向展开）</text>

  <!-- Segment bar -->
  <text x="52" y="120" class="small">Layer 1：主曝光 · 分段区间 [0, 100)</text>
  <rect x="52" y="130" width="580" height="30" class="pill" rx="6" ry="6"/>
  <!-- Segment A 0-30 -->
  <rect x="54" y="132" width="170" height="26" class="segment-a" rx="6" ry="6"/>
  <text x="60" y="149" class="small">Segment A [0, 30)</text>
  <!-- Segment B 30-70 -->
  <rect x="226" y="132" width="230" height="26" class="segment-b segment-selected" rx="6" ry="6"/>
  <text x="232" y="149" class="small">Segment B [30, 70)</text>
  <!-- Segment C 70-100 -->
  <rect x="460" y="132" width="170" height="26" class="segment-c" rx="6" ry="6"/>
  <text x="466" y="149" class="small">Segment C [70, 100)</text>

  <!-- Segment actions -->
  <rect x="52" y="170" width="80" height="22" class="pill" rx="4" ry="4"/>
  <text x="60" y="185" class="small">新增分段</text>

  <rect x="140" y="170" width="120" height="22" class="pill" rx="4" ry="4"/>
  <text x="148" y="185" class="small">调整分段流量</text>

  <!-- Groups for Segment B -->
  <text x="52" y="214" class="small">Segment B 分组与流量</text>

  <rect x="52" y="226" width="180" height="90" class="group" rx="8" ry="8"/>
  <text x="60" y="246" class="small">默认组</text>
  <text x="60" y="264" class="small">当前流量：80%</text>

  <rect x="246" y="226" width="180" height="90" class="group group-selected" rx="8" ry="8"/>
  <text x="254" y="246" class="small">Group B1：新UI</text>
  <text x="254" y="264" class="small">当前流量：20%</text>
  <!-- Group actions for 非默认组 -->
  <rect x="254" y="272" width="70" height="20" class="pill" rx="4" ry="4"/>
  <text x="262" y="287" class="small">扩缩容</text>

  <rect x="332" y="272" width="60" height="20" class="pill" rx="4" ry="4"/>
  <text x="342" y="287" class="small">删除</text>

  <!-- Group area actions -->
  <rect x="52" y="326" width="80" height="22" class="pill" rx="4" ry="4"/>
  <text x="60" y="341" class="small">新增组</text>

  <rect x="140" y="326" width="100" height="22" class="pill" rx="4" ry="4"/>
  <text x="148" y="341" class="small">流量打散</text>

  <!-- Config sidebar -->
  <rect x="640" y="102" width="260" height="348" class="box" rx="8" ry="8"/>
  <text x="652" y="124" class="small">配置区域</text>

  <!-- 配置编辑框 -->
  <rect x="652" y="142" width="232" height="180" class="box" rx="6" ry="6"/>
  <text x="660" y="160" class="small">{</text>
  <text x="660" y="178" class="small">  "discount": 0.9,</text>
  <text x="660" y="196" class="small">  "min_price": 100,</text>
  <text x="660" y="214" class="small">  "tag": "vip"</text>
  <text x="660" y="232" class="small">}</text>

  <!-- 按钮 -->
  <rect x="652" y="340" width="90" height="26" class="pill" rx="4" ry="4"/>
  <text x="666" y="358" class="small">更新配置</text>

  <rect x="764" y="340" width="120" height="26" class="pill" rx="4" ry="4"/>
  <text x="776" y="358" class="small">历史配置</text>
</svg>
