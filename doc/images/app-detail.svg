<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
  <style>
    .title { font: 18px sans-serif; fill: #222; }
    .label { font: 14px sans-serif; fill: #444; }
    .small { font: 12px sans-serif; fill: #555; }
    .box  { fill: #f9fbff; stroke: #b3c0ff; stroke-width: 1.5; }
    .header { fill: #eef2ff; }
    .pill { fill: #e5e7eb; }
    .btn { fill: #4f46e5; stroke: #4338ca; stroke-width: 1; }
    .btn-text { font: 12px sans-serif; fill: #fff; }
    .danger { fill: #fee2e2; stroke: #ef4444; stroke-width: 1; }
  </style>

  <rect x="60" y="30" width="520" height="320" class="box" rx="8" ry="8"/>
  <rect x="60" y="30" width="520" height="36" class="header" rx="8" ry="8"/>
  <text x="76" y="54" class="title">应用详情</text>

  <text x="80" y="100" class="label">应用名</text>
  <rect x="160" y="84" width="220" height="28" class="box" rx="4" ry="4"/>
  <text x="170" y="104" class="small">demo-app-1</text>

  <text x="80" y="140" class="label">应用ID</text>
  <rect x="160" y="124" width="220" height="28" class="pill" rx="4" ry="4"/>
  <text x="170" y="144" class="small">1001</text>

  <text x="80" y="180" class="label">描述</text>
  <rect x="160" y="164" width="400" height="80" class="box" rx="4" ry="4"/>
  <text x="170" y="186" class="small">用于会员折扣实验的主应用</text>

  <rect x="320" y="270" width="80" height="30" class="btn" rx="6" ry="6"/>
  <text x="344" y="290" class="btn-text">更新</text>

  <rect x="410" y="270" width="80" height="30" class="danger" rx="6" ry="6"/>
  <text x="434" y="290" class="small">删除</text>

  <rect x="500" y="270" width="80" height="30" class="pill" rx="6" ry="6"/>
  <text x="524" y="290" class="small">关闭</text>
</svg>
