<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <style>
    .title { font: 20px sans-serif; fill: #222; }
    .label { font: 14px sans-serif; fill: #444; }
    .small { font: 12px sans-serif; fill: #555; }
    .box  { fill: #f9fbff; stroke: #b3c0ff; stroke-width: 1.5; }
    .header { fill: #eef2ff; }
    .pill { fill: #e5e7eb; }
    .op { fill: #4f46e5; }
    .op-text { font: 12px sans-serif; fill: #fff; }
    .node { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; }
    .segment-a { fill: #bfdbfe; }
    .segment-b { fill: #a7f3d0; }
    .segment-c { fill: #fecaca; }
    .segment-selected { stroke: #1d4ed8; stroke-width: 2; }
    .group { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; }
    .group-selected { stroke: #1d4ed8; stroke-width: 2; }
  </style>

  <text x="40" y="40" class="title">实验详情页示意</text>

  <!-- 整体容器 -->
  <rect x="40" y="60" width="880" height="440" class="box"/>
  <rect x="40" y="60" width="880" height="32" class="header"/>
  <text x="52" y="82" class="label">实验详情</text>

  <!-- 1. 基本情况（展示内容参考 app-detail.svg） -->
  <rect x="52" y="104" width="856" height="120" class="box" rx="6" ry="6"/>
  <text x="64" y="124" class="small">基本情况</text>
  <text x="64" y="150" class="label">实验名</text>
  <rect x="140" y="134" width="220" height="28" class="box" rx="4" ry="4"/>
  <text x="150" y="154" class="small">exp-A</text>
  <text x="64" y="190" class="label">描述</text>
  <rect x="140" y="174" width="400" height="40" class="box" rx="4" ry="4"/>
  <text x="150" y="198" class="small">会员折扣实验示意描述</text>

  <!-- 基本情况操作按钮 -->
  <rect x="700" y="140" width="70" height="24" class="pill" rx="4" ry="4"/>
  <text x="716" y="156" class="small">更新</text>

  <rect x="780" y="140" width="90" height="24" class="pill" rx="4" ry="4"/>
  <text x="786" y="156" class="small">流量打散</text>

  <!-- 2. 过滤条件（留白区域，用于承载 filter 规则树） -->
  <rect x="52" y="244" width="856" height="110" class="box" rx="6" ry="6"/>
  <text x="64" y="264" class="small">过滤条件</text>

  <!-- 3. 分流设置（留白区域，用于承载 layer/segment/group 配置） -->
  <rect x="52" y="366" width="856" height="110" class="box" rx="6" ry="6"/>
  <text x="64" y="386" class="small">分流设置</text>
</svg>
